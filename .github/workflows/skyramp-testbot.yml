name: Skyramp Testbot

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.head.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  testbot:
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'issue_comment' ||
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: skyramp/testbot@v0.10.4
        with:
          skyramp_license_file: ${{ secrets.SKYRAMP_LICENSE_FILE }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          target_setup_command: './deployment-testbot/setup.sh'
          target_ready_check_command: 'curl -f http://localhost:9000/api/app/about'
          target_ready_check_timeout: 180
          auth_token_command: './deployment-testbot/get-token.sh'
          test_directory: 'tests'
          auto_commit: true
          post_pr_comment: true
